    <style>
        :root {
            --g-dark: #0C111D;
            --g-primary: #00FFC8;
            --g-bg: #faf9f5;
            --g-card: #ffffff;
            --g-border: #e8e6dc;
            --g-muted: #6b7280;
            --g-error: #c1352b;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: var(--g-dark);
            background: var(--g-bg);
            -webkit-font-smoothing: antialiased;
        }
        .hidden { display: none !important; }
        .staticrypt-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .staticrypt-form {
            width: 100%;
            max-width: 420px;
            background: var(--g-card);
            border: 1px solid var(--g-border);
            border-radius: 14px;
            padding: 40px 36px 32px;
            text-align: left;
        }
        .staticrypt-logo {
            display: block;
            width: 140px;
            height: auto;
            margin: 0 0 28px;
        }
        .staticrypt-instructions {
            margin: 0 0 24px;
        }
        .staticrypt-instructions h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0 0 8px;
            color: var(--g-dark);
        }
        .staticrypt-instructions p {
            margin: 0;
            color: var(--g-muted);
            font-size: 15px;
        }
        .staticrypt-password-container {
            position: relative;
            margin: 0 0 16px;
        }
        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"] {
            width: 100%;
            background: var(--g-bg);
            border: 1px solid var(--g-border);
            border-radius: 10px;
            color: var(--g-dark);
            font: inherit;
            font-size: 15px;
            padding: 14px 44px 14px 16px;
            outline: none;
            transition: border-color 120ms ease, box-shadow 120ms ease;
        }
        .staticrypt-form input[type="password"]:focus,
        .staticrypt-form input[type="text"]:focus {
            border-color: var(--g-dark);
            box-shadow: 0 0 0 3px rgba(0, 255, 200, 0.35);
        }
        .staticrypt-toggle-password-visibility {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            cursor: pointer;
            opacity: 0.55;
            transition: opacity 120ms ease;
        }
        .staticrypt-toggle-password-visibility:hover { opacity: 1; }
        .staticrypt-decrypt-button {
            width: 100%;
            background: var(--g-primary);
            color: var(--g-dark);
            font: inherit;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.01em;
            border: 0;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: transform 80ms ease, filter 120ms ease;
        }
        .staticrypt-decrypt-button:hover { filter: brightness(0.95); }
        .staticrypt-decrypt-button:active { transform: translateY(1px); }
        .staticrypt-remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--g-muted);
            margin: 14px 0 0;
            user-select: none;
        }
        .staticrypt-remember input { accent-color: var(--g-dark); }
        .staticrypt-hr {
            border: 0;
            border-top: 1px solid var(--g-border);
            margin: 24px 0 16px;
        }
        .staticrypt-footer {
            font-size: 12px;
            color: var(--g-muted);
            margin: 16px 0 0;
            text-align: center;
        }
        #staticrypt_loading {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--g-muted);
            font-size: 14px;
        }
    </style>
